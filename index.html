<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Earn - Premium Dashboard</title>
    <style>
        body {
            background-color: #000; /* কালো ব্যাকগ্রাউন্ড */
            color: #d4af37; /* সোনালী টেক্সট */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: 50px auto;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        h1 { font-size: 24px; text-transform: uppercase; }
        .balance { font-size: 40px; margin: 20px 0; color: #fff; }
        .btn {
            background: linear-gradient(45deg, #d4af37, #f9e29c);
            color: #000;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Easy Earn</h1>
        <p>Current Balance</p>
        <div class="balance">$0.00</div>
        <button class="btn" onclick="earnMoney()">Click to Earn</button>
        <p id="msg" style="margin-top: 15px; color: #aaa;"></p>
    </div>

    <script>
        let balance = 0;
        function earnMoney() {
            balance += 0.50;
            document.querySelector('.balance').innerText = "$" + balance.toFixed(2);
            document.getElementById('msg').innerText = "Added $0.50 to your account!";
        }
    </script>
</body>
</html>
