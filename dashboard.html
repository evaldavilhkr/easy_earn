<<h2>Available Tasks</h2>
<div id="tasks"></div>

<script type="module">
import { fetchTasks } from './js/tasks.js';
fetchTasks("tasks");
</script>
db.collection("tasks").where("status","==","active").get()
.then(snapshot=>{
  snapshot.forEach(doc=>{
    const task = doc.data();
    document.getElementById("tasks").innerHTML += `
      <div>
        <h3>${task.title}</h3>
        <p>Reward: ${task.reward} Tk</p>
        <a href="submit.html?id=${doc.id}">Submit Task</a>
      </div>`;
  });
});
</script>
